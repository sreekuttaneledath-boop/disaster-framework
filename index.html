<!DOCTYPE html>
<html>
<head>
    <title>Disaster Management Map</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .node { border: 1px solid #bb86fc; padding: 10px; display: inline-block; margin: 10px; border-radius: 5px; cursor: pointer; }
        .node:hover { background: #bb86fc; color: black; }
        ul { list-style: none; padding-left: 20px; }
    </style>
</head>
<body>
    <h1>Disaster Management Policy Framework (India)</h1>
    <p>Click on nodes to expand/collapse</p>
    <div id="tree">
        <ul>
            <li>
                <div class="node" onclick="toggle(this)">Main Framework</div>
                <ul>
                    <li><div class="node">Global Architecture</div></li>
                    <li><div class="node">National Legislative</div></li>
                    <li><div class="node">Institutional Hierarchy</div></li>
                    <li><div class="node">Key Strategies</div></li>
                </ul>
            </li>
        </ul>
    </div>
    <script>
        function toggle(el) {
            const childUl = el.parentElement.querySelector('ul');
            if (childUl) childUl.style.display = childUl.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
